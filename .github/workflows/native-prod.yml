name: Native prod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build native binary
        run: ./mvnw -B package -Dnative -Dquarkus.native.container-build=true -DskipTests -Dquarkus.native.native-image-xmx=6g

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -f src/main/docker/Dockerfile.native-micro \
            -t ghcr.io/jet-sistemas/backoffice:native \
            -t ghcr.io/jet-sistemas/backoffice:${{ github.sha }} .
          docker push ghcr.io/jet-sistemas/backoffice:native
          docker push ghcr.io/jet-sistemas/backoffice:${{ github.sha }}

      - name: Redeploy Railway
        run: |
          npm i -g @railway/cli
          railway redeploy --service backoffice --environment production --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
