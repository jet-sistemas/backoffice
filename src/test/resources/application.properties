%test.quarkus.datasource.devservices.enabled=true

%test.quarkus.hibernate-orm.database.generation=drop-and-create

%test.quarkus.scheduler.enabled=false

%test.backoffice.storage.r2.endpoint=http://127.0.0.1:9000
%test.backoffice.storage.r2.region=us-east-1
%test.backoffice.storage.r2.access-key-id=test
%test.backoffice.storage.r2.secret-access-key=test
%test.backoffice.storage.r2.bucket=test
%test.backoffice.storage.key-env-prefix=test
%test.backoffice.storage.upload.max-bytes=5242880
%test.backoffice.storage.upload.sign-ttl-seconds=300
%test.backoffice.storage.upload.rate-limit.capacity=100000
%test.backoffice.storage.upload.rate-limit.refill-minutes=1

%test.backoffice.billing.zone-id=America/Sao_Paulo
%test.backoffice.billing.status-batch-size=1
