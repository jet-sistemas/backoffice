# QUARKUS CONFIG
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# drop and create the database at startup (use `update` to only update the schema)
quarkus.hibernate-orm.packages=backoffice.v1.entities
quarkus.datasource.jdbc.driver=org.postgresql.Driver

# TABLE NAMING SNAKE CASE
quarkus.hibernate-orm.physical-naming-strategy=backoffice.common.config.SnakeCasePhysicalNamingStrategy

# JWT TOKEN
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
quarkus.native.resources.includes=publicKey.pem,privateKey.pem
# Native: Apache HttpClient (transitivo do AWS url-connection-client) instancia SecureRandom em <clinit>
quarkus.native.additional-build-args=--initialize-at-run-time=org.apache.http.impl.auth.NTLMEngineImpl\\,software.amazon.awssdk.utils.cache.CachedSupplier
mp.jwt.verify.issuer=sign-in

# Endpoints públicos (sem autenticação)
quarkus.http.auth.permission.public.paths=/v1/auth
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.methods=POST

quarkus.http.auth.permission.public-v1.paths=/v1/public/*
quarkus.http.auth.permission.public-v1.policy=permit

# Garante que endpoints sejam protegidos por padrão
quarkus.http.auth.permission.default.paths=/*
quarkus.http.auth.permission.default.policy=authenticated

# Display logs
quarkus.log.category."io.quarkus.smallrye.jwt.runtime.auth.MpJwtValidator".level=TRACE
quarkus.log.category."io.quarkus.smallrye.jwt.runtime.auth.MpJwtValidator".min-level=TRACE

# DATABASE CONFIG
quarkus.datasource.db-kind = ${DB_KIND}
quarkus.datasource.username = ${DB_USERNAME}
quarkus.datasource.password = ${DB_PASSWORD}
quarkus.datasource.jdbc.url = ${DB_URL}

# drop and create the database at startup (use `update` to only update the schema)
# quarkus.hibernate-orm.database.generation = drop-and-create
quarkus.hibernate-orm.database.generation = update
quarkus.hibernate-orm.log.sql=true

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=Jet Backoffice API
quarkus.smallrye-openapi.info-version=1.1.0
quarkus.smallrye-openapi.info-description=API do backoffice da Associação Desportiva Artística e Cultural Joyce e Teatino
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=bearerAuth
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer Token
quarkus.swagger-ui.always-include=true
quarkus.http.auth.permission.swagger.paths=/q/swagger-ui/*,/q/openapi
quarkus.http.auth.permission.swagger.policy=permit

# Cloudflare R2 (S3-compatible). Credenciais e bucket: variáveis de ambiente / secrets (sem valor vazio no arquivo).
backoffice.storage.r2.endpoint=${STORAGE_ENDPOINT}
backoffice.storage.r2.region=${STORAGE_REGION}
backoffice.storage.r2.access-key-id=${STORAGE_ACCESS_KEY_ID}
backoffice.storage.r2.secret-access-key=${STORAGE_SECRET_ACCESS_KEY}
backoffice.storage.r2.bucket=${STORAGE_BUCKET}

backoffice.storage.key-env-prefix=${STORAGE_KEY_ENV_PREFIX}
backoffice.storage.upload.max-bytes=${STORAGE_UPLOAD_MAX_BYTES}
backoffice.storage.upload.sign-ttl-seconds=${STORAGE_UPLOAD_SIGN_TTL_SECONDS}
backoffice.storage.upload.rate-limit.capacity=${STORAGE_UPLOAD_RATE_LIMIT_CAPACITY}
backoffice.storage.upload.rate-limit.refill-minutes=${STORAGE_UPLOAD_RATE_LIMIT_REFILL_MINUTES}

# Runs every 5 days at 05:00
backoffice.billing.due-soon-days=5
backoffice.billing.zone-id=America/Sao_Paulo
# 0 50 16 15 * ? -> Case for testing
backoffice.billing.status-cron=0 0 5 1/5 * ?
backoffice.billing.status-batch-size=500 